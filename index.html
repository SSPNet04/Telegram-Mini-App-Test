<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram Counter Mini App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />


  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .counter {
      font-size: 48px;
      margin: 20px 0;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
    
    html, body {
      touch-action: manipulation;
    }
  </style>
</head>

<body>
  <h1 id="date">Checking App</h1>
  <div><input oninput="updateUI()" type="number" id="current_value" placeholder="0"></div>

  <div class="counter" id="count">0</div>
  <div id="per_day"></div>

  <script>
    // Initialize Telegram Mini App
    const tg = window.Telegram.WebApp;
    const dailyBudget = 200;
    const maxBudget = 6000;

    let dateToday = new Date();
    let fullDate = dateToday.toLocaleDateString();
    document.getElementById("date").innerText = fullDate;

    let today = dateToday.getDate();

    let lastDayOfMonth = new Date(dateToday.getFullYear(),dateToday.getMonth()+1,0);
    let dayInMonth = lastDayOfMonth.getDate();
    let remainingDay = dayInMonth - dateToday.getDate();

    const budget = Math.min(dayInMonth * dailyBudget, maxBudget);
    const earnBudget = today * dailyBudget;

    tg.ready();
    updateUI();

    function debug(){
      let remaining = (earnBudget - budget) + getCurrentValue();
      console.log("Remaining: "+remaining);
      console.log("Earn Budget: "+earnBudget);
    }

    function updateUI() {
      //debug();
      let current = getCurrentValue();
      let remaining = (earnBudget - budget) + current;

      document.getElementById("count").innerText = remaining;
      document.getElementById("per_day").innerText = Math.min(current / remainingDay,200);
    }

    function getCurrentValue(){
      let currentValue = Number(document.getElementById("current_value").value);
      return currentValue;
    }
    

  </script>
</body>
</html>
