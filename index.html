<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram Counter Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .counter {
      font-size: 48px;
      margin: 20px 0;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Checking App</h1>
  <div><input type="number" id="current_value"></div>

  <div class="counter" id="count">0</div>

  <div>
    <button onclick="update()">Check</button>
  </div>

  <script>
    // Initialize Telegram Mini App
    const tg = window.Telegram.WebApp;
    let today = new Date();
    tg.ready();

    function updateUI() {
      document.getElementById("count").innerText = ((today.getDate()*200) - 6000) + getCurrentValue();
    }

    function getCurrentValue(){
      let currentValue = Number(document.getElementById("current_value").value);
      return currentValue;
    }

    function statusCheck(){
      if(count > 10){ 
        tg.close();
      }

      if(count > 5 && !tg.isFullscreen){
        tg.requestFullscreen();
      }

      if(count <= 5 && tg.isFullscreen){
        tg.exitFullscreen();
      }
    }

    function update() {
      updateUI();
    }
  </script>
</body>
</html>
